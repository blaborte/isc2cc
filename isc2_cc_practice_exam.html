ctive of a degaussing?", "options": {"A": "Preventing magnetic side-channel attacks", "B": "Reducing noisy data on a disk", "C": "Erasing the data on a disk", "D": "Retaining the data on a disk"}, "correct": "C", "explanation": "Degaussing's primary objective is erasing data on magnetic storage media by applying a strong magnetic field. It permanently destroys the data. It does not retain data, reduce noise, or prevent side-channel attacks."}, {"num": 140, "text": "Which of these is part of the canons (ISC)² code of ethics?", "options": {"A": "Provide diligent and competent services to stakeholders", "B": "Advance and protect the profession", "C": "Prevent and detect unauthorized use of digital assets in a society", "D": "Act always in the best interest of your client"}, "correct": "B", "explanation": "The correct canon is 'Advance and protect the profession' — the ISC2 fourth canon. The canons are: protect society, act honorably, provide diligent service to principals, and advance and protect the profession."}, {"num": 141, "text": "Which of these is NOT one of the (ISC)² ethics canons?", "options": {"A": "Act honorably, honestly, justly, responsibly, and legally", "B": "Consider the social consequences of the systems you are designing", "C": "Protect society, the common good, necessary public trust and confidence, and the infrastructure", "D": "Provide diligent and competent service to principals"}, "correct": "B", "explanation": "'Consider the social consequences of the systems you are designing' comes from the ACM Code of Ethics, NOT ISC2. The four ISC2 canons cover society, honorable conduct, service to principals, and advancing the profession."}, {"num": 142, "text": "(★) Which of these is the PRIMARY objective of the PCI-DSS standard?", "options": {"A": "Personally Identifiable Information (PII)", "B": "Change Management", "C": "Secure Credit Cards Payments", "D": "Protected Health Information (PHI)"}, "correct": "C", "explanation": "PCI-DSS (Payment Card Industry Data Security Standard) primarily aims to secure credit card payments and protect cardholder data. PII is handled by privacy laws; PHI is covered by HIPAA."}, {"num": 143, "text": "Which of these is an attack that encrypts the organization's information, and then demands payment for the decryption code?", "options": {"A": "Phishing", "B": "DDoS", "C": "Spoofing", "D": "Ransomware"}, "correct": "D", "explanation": "Ransomware encrypts organizational data and demands payment for decryption. Phishing steals credentials; DDoS disrupts availability; Spoofing falsifies identity — none specifically encrypt and ransom."}, {"num": 144, "text": "The PRIMARY objective of a business continuity plan is:", "options": {"A": "To regularly verify whether the organization complies with applicable regulations", "B": "To sustain business operations while recovering from a disruption", "C": "To assess the impact of disruption to the business", "D": "To restore the business to the full last-known reliable state of operations"}, "correct": "B", "explanation": "A BCP's primary objective is to sustain business operations while recovering from disruption. DRP restores IT systems; BIA assesses impact; compliance verification is an audit function."}, {"num": 145, "text": "Which of these is an attack whose PRIMARY goal is to gain access to a target system through falsified identity?", "options": {"A": "Ransomware", "B": "Amplification", "C": "Spoofing", "D": "DDoS"}, "correct": "C", "explanation": "Spoofing's primary goal is gaining access through falsified identity — impersonating a trusted entity. Ransomware encrypts data; DDoS disrupts service; Amplification increases attack volume."}, {"num": 146, "text": "When an incident occurs, which of these is not a PRIMARY responsibility of an organization's response team?", "options": {"A": "Determining the scope of the damage caused by the incident", "B": "Implementing the recovery procedures necessary to restore security and recover from any incident-related damage", "C": "Determining whether any confidential information has been compromised over the course of the entire incident", "D": "Communicating with top management regarding the circumstances of the cybersecurity event"}, "correct": "D", "explanation": "Communicating with top management is NOT a primary IRT responsibility during an incident — it is administrative. Primary responsibilities are: determining damage scope, implementing recovery, and assessing data compromise."}, {"num": 147, "text": "What is the PRIMARY objective of a rollback in the context of the change management process?", "options": {"A": "Identify the required changes needed", "B": "Validate the system change process", "C": "Restore the system to its last state before the change was made", "D": "Establish a minimum understood and acceptable level of security requirements"}, "correct": "C", "explanation": "Rollback restores a system to its last known good state before the change was made, undoing problematic changes. This is the safety mechanism that protects against failed changes."}, {"num": 148, "text": "Which of these entities is responsible for signing an organization's policies?", "options": {"A": "Human Resources", "B": "Security engineer", "C": "Financial Department", "D": "Senior management"}, "correct": "D", "explanation": "Senior management signs and approves organizational policies, giving them authority. HR implements people-related policies; security engineers design controls; financial manages budgets."}, {"num": 149, "text": "Which of these terms refers to threats with unusually high technical and operational sophistication, spanning months or even years?", "options": {"A": "Rootkit", "B": "APT", "C": "Side-channel", "D": "Ping of death"}, "correct": "B", "explanation": "APT (Advanced Persistent Threat) describes high-sophistication, long-duration threats spanning months or years, typically from nation-state actors targeting specific high-value organizations."}, {"num": 150, "text": "The PRIMARY objective of a security baseline is to establish ...", "options": {"A": ". a minimum understood and a good level of security requirements", "B": "a minimum understood and acceptable level of security requirements", "C": "security and configuration requirements", "D": "a maximum understood and an acceptable level of security requirements"}, "correct": "B", "explanation": "A security baseline establishes a minimum understood and acceptable level of security requirements — the floor below which systems should not fall. 'Maximum' and 'good level' are incorrect characterizations."}, {"num": 151, "text": "Which of these attacks take advantage of inadequate input validation in websites?", "options": {"A": "Phishing", "B": "Trojans", "C": "Cross-Site Scripting", "D": "Rootkits"}, "correct": "C", "explanation": "XSS (Cross-Site Scripting) exploits inadequate input validation in websites, injecting malicious scripts that execute in other users' browsers. This is the same weakness as poor input validation."}, {"num": 152, "text": "An organization needs a network security tool that detects and acts in the event of malicious activity. Which of these tools will BEST meet their needs?", "options": {"A": "Router", "B": "IPS", "C": "IDS", "D": "Firewall"}, "correct": "B", "explanation": "IPS (Intrusion Prevention System) detects AND acts (blocks) malicious activity in real time. IDS only detects; firewalls filter by predetermined rules; routers direct traffic. The key is 'acts.'"}, {"num": 153, "text": "In a DAC policy scenario, which of these tasks can only be performed by a subject granted access to information?", "options": {"A": "Changing security attributes", "B": "Reading the information", "C": "Executing the information", "D": "Modifying the information"}, "correct": "A", "explanation": "In DAC, only a subject who has been granted access to information can change its security attributes. Reading, executing, and modifying can be delegated, but attribute changes belong to the owner."}, {"num": 154, "text": "In the event of non-compliance, which of these can have considerable financial consequences for an organization?", "options": {"A": "Policies", "B": "Regulations", "C": "Guidelines", "D": "Standards"}, "correct": "B", "explanation": "Regulations carry legal/financial penalties for non-compliance because they are government-mandated law. Organizational policies, guidelines, and standards lack this legal enforcement power."}, {"num": 155, "text": "What does the term LAN refer to?", "options": {"A": "A tool to manage and control network traffic, as well as to protect a network.", "B": "A network on a building or limited geographical area", "C": "A device that connects multiple other devices in a network", "D": "A long-distance connection between geographically-distant networks"}, "correct": "B", "explanation": "LAN (Local Area Network) is a network within a building or limited geographical area. The description matches this definition. A firewall manages traffic; a switch connects devices; a WAN covers long distances."}, {"num": 156, "text": "Which of these is a type of corrective security control?", "options": {"A": "Patches", "B": "Intrusion detection systems", "C": "Guidelines", "D": "Encryption"}, "correct": "A", "explanation": "Patches are corrective controls — they fix existing vulnerabilities after discovery. IDS is detective; guidelines are administrative/supportive; encryption is preventive."}, {"num": 157, "text": "Which of these enables point-to-point online communication over an untrusted network?", "options": {"A": "VLAN", "B": "Firewall", "C": "Router", "D": "VPN"}, "correct": "D", "explanation": "VPN (Virtual Private Network) enables secure point-to-point communication over untrusted networks by creating an encrypted tunnel. VLAN segments networks; firewalls filter; routers direct traffic."}, {"num": 158, "text": "At which of the OSI layers do TCP and UDP work?", "options": {"A": "Transport Layer", "B": "Session Layer", "C": "Application Layer", "D": "Physical Layer"}, "correct": "A", "explanation": "TCP and UDP operate at the Transport Layer (Layer 4) of the OSI model, handling end-to-end communication, flow control, and error recovery."}, {"num": 159, "text": "(★) Which is the PRIMARY focus of the ISO 27002 standard?", "options": {"A": "Health Insurance Portability and Accountability Act (HIPAA)", "B": "Information Security Management System (ISMS)", "C": "Risk Management", "D": "Application Security"}, "correct": "B", "explanation": "ISO 27002 is focused on Information Security Management System (ISMS) — providing a code of practice for information security controls. HIPAA is a US regulation; ISO 27002 is broader than just risk management or app security."}, {"num": 160, "text": "(★) Which of these different sub-masks will allow 30 hosts?", "options": {"A": "/26", "B": "/30", "C": "/27", "D": "/29"}, "correct": "C", "explanation": "A /27 subnet provides 32 addresses (2^5), with 30 usable hosts (minus network and broadcast). /26 = 62 hosts; /29 = 6 hosts; /30 = 2 hosts. Formula: 2^(32-prefix) - 2."}, {"num": 161, "text": "(★) Which of these statements about the security implications of IPv6 is NOT true?", "options": {"A": "Rules based on static IPv6 addresses may not work", "B": "IPv6's NAT implementation is insecure", "C": "IPv6 traffic may bypass existing security controls", "D": "IPv6 reputation services may not be mature and useful"}, "correct": "B", "explanation": "IPv6 does NOT have a NAT (Network Address Translation) implementation — IPv6 was designed with enough addresses to eliminate NAT. So 'IPv6's NAT implementation is insecure' is FALSE."}, {"num": 162, "text": "Which of these is a type of detective access control?", "options": {"A": "Bollards", "B": "Movement Sensors", "C": "Turnstiles", "D": "Firewalls"}, "correct": "B", "explanation": "Movement sensors are detective access controls — they detect unauthorized presence and trigger alerts. Bollards and turnstiles are preventive physical controls; firewalls are preventive technical controls."}, {"num": 163, "text": "The name, age, location and job title of a person are all examples of:", "options": {"A": "Biometric factors", "B": "Attributes", "C": "Account permissions", "D": "Identity factors"}, "correct": "B", "explanation": "Name, age, location, and job title are all Attributes — pieces of information describing an identity. In ABAC, attributes are used to make access control decisions."}, {"num": 164, "text": "Which cloud service model provides the most suitable environment for customers who want to install their custom operating system?", "options": {"A": "SaaS", "B": "SLA", "C": "IaaS", "D": "PaaS"}, "correct": "C", "explanation": "IaaS provides the most control, allowing customers to install custom operating systems on virtual machines. SaaS provides applications; PaaS provides development platforms; SLA is not a cloud service model."}, {"num": 165, "text": "(★) Which of these statements is TRUE about cybersquatting?", "options": {"A": "Its an unethical practice but everyone does it", "B": "It is partially illegal practice", "C": "It is an illegal practice", "D": "It is s a legal practice"}, "correct": "C", "explanation": "Cybersquatting is illegal under the Anti-Cybersquatting Consumer Protection Act (ACPA) in the US and similar laws internationally. Registering domain names to profit from others' trademarks is not legal or partially legal."}, {"num": 166, "text": "Which of these addresses is commonly reserved specifically for broadcasting?", "options": {"A": "192.299.121.254", "B": "192.299.121.0", "C": "192.299.121.14", "D": "192.299.121.255"}, "correct": "D", "explanation": "The .255 address (e.g., 192.299.121.255) is reserved for broadcasting on a subnet. The .0 address is the network address; .254 is typically the last usable host address."}, {"num": 167, "text": "Which department in a company is NOT typically involved in a Disaster Recovery Plan (DRP)?", "options": {"A": "Executive", "B": "Financial", "C": "Public Relations", "D": "IT"}, "correct": "C", "explanation": "Public Relations is NOT typically involved in a Disaster Recovery Plan. Executives, IT, and Financial departments are core DRP participants; PR may handle crisis communications but is not a DRP function."}, {"num": 168, "text": "Which of these pairs does NOT constitute Multi-Factor Authentication (MFA)?", "options": {"A": "Fingerprint and password.", "B": "Username and retina scan.", "C": "Password and username.", "D": "PIN and credit card."}, "correct": "C", "explanation": "Password and username are both 'something you know' — two of the same factor type does NOT constitute MFA. MFA requires factors from different categories (know + have + are)."}, {"num": 169, "text": "Which method is COMMONLY used to map live hosts in the network?", "options": {"A": "Geolocation", "B": "Traceroute", "C": "Ping sweep", "D": "Wireshark"}, "correct": "C", "explanation": "Ping sweep sends ICMP echo requests to a range of addresses to identify live hosts. Traceroute maps the network path; Wireshark captures traffic; Geolocation maps physical locations."}, {"num": 170, "text": "A poster reminding the best password management practices is an example of which type of learning activity?", "options": {"A": "Awareness", "B": "Schooling", "C": "Education", "D": "Training"}, "correct": "A", "explanation": "A password management poster is an Awareness activity — passive delivery of security reminders. Training involves developing specific skills; Education involves comprehensive, formal learning."}, {"num": 171, "text": "Which part of the CIA Triad will be PRIMARILY jeopardized in a Distributed Denial Of Service (DDOS) attack?", "options": {"A": "Accountability", "B": "Availability", "C": "Integrity", "D": "Confidentiality"}, "correct": "B", "explanation": "DDoS attacks primarily jeopardize Availability — making services unavailable to legitimate users. Confidentiality and Integrity are not the primary targets of a DoS/DDoS attack."}, {"num": 172, "text": "(★) What technology is MOST LIKELY to conserve the storage space required for video recordings?", "options": {"A": "Motion detection", "B": "PTZ", "C": "Facial recognition", "D": "Infrared cameras"}, "correct": "A", "explanation": "Motion detection conserves storage by only recording when movement is detected, rather than continuously. PTZ cameras can zoom but don't conserve storage; facial recognition and infrared don't specifically reduce storage."}, {"num": 173, "text": "An organization that uses a layered approach when designing its security architecture is using which of these security approaches?", "options": {"A": "Zero trust", "B": "Defense in depth", "C": "Network Layers", "D": "Network Control Access"}, "correct": "B", "explanation": "Defense in Depth uses a layered security architecture with multiple controls at different levels. Zero Trust is about identity verification; Network Layers is OSI terminology; NCA is not a standard security approach."}, {"num": 174, "text": "Which of these techniques will ensure the property of 'non-repudiation'?", "options": {"A": "Using a VPN", "B": "Passwords", "C": "Encryption", "D": "Digital signatures"}, "correct": "D", "explanation": "Digital signatures provide non-repudiation — proving that a specific party signed a document using their private key, which they cannot deny. VPN, passwords, and encryption don't provide this property."}, {"num": 175, "text": "(★) A USB pen with data passed around the office is an example of:", "options": {"A": "Data in motion", "B": "Data at rest", "C": "Data in transit", "D": "Data in use"}, "correct": "C", "explanation": "A USB drive passed around the office is data in transit (in motion) — physically moving between locations. Data at rest is stored; data in use is being actively processed."}, {"num": 176, "text": "Suppose that an organization wants to implement measures to strengthen its detective access controls. Which one of these tools should they implement?", "options": {"A": "Patches", "B": "Encryption", "C": "IDS", "D": "Backups"}, "correct": "C", "explanation": "IDS (Intrusion Detection System) is a detective control that monitors and alerts on suspicious activity. Patches are corrective; encryption is preventive; backups support availability/recovery."}, {"num": 177, "text": "(★) Which of these is an example of a MAC address?", "options": {"A": "00-51-02-1F-58-F6", "B": "0051021f58", "C": "10.23.19.49", "D": "2001 : db8: 3333 : 4444 : 5555 : 6666 : 7777 : 8888"}, "correct": "A", "explanation": "A MAC address format is XX-XX-XX-XX-XX-XX (six pairs of hex digits with hyphens or colons). 00-51-02-1F-58-F6 matches this exactly. The others show a short hex string, IPv4, and IPv6 addresses."}, {"num": 178, "text": "Which of these types of credentials is NOT used in multi-factor authentication?", "options": {"A": "Something you have", "B": "Something you know", "C": "Something you are", "D": "Something you trust"}, "correct": "D", "explanation": "'Something you trust' is NOT a valid MFA category. The three categories are: Something you know (password/PIN), Something you have (token/smart card), Something you are (biometrics)."}, {"num": 179, "text": "On an Incident Response team, which role acts as the team's main link to Senior Management?", "options": {"A": "Information security", "B": "Communications and public relations", "C": "Management", "D": "Technical expert"}, "correct": "C", "explanation": "The Management role on an IRT serves as the main link to Senior Management, escalating decisions and providing status updates. Communications/PR handles external messaging; Technical experts handle analysis."}, {"num": 180, "text": "Which of these is NOT an effective way to protect an organization from cybercriminals?", "options": {"A": "Removing or disabling unneeded services and protocols", "B": "Using firewalls", "C": "Using out-dated anti-malware software", "D": "Using intrusion detection and prevention systems"}, "correct": "C", "explanation": "Using outdated anti-malware software is NOT effective protection — it cannot detect new threats. Current antimalware, firewalls, removing unneeded services, and IDS/IPS are all effective methods."}, {"num": 181, "text": "Which of these CANNOT be a corrective security control?", "options": {"A": "Disaster Recovery Plan", "B": "Backups", "C": "Patches", "D": "Bollards"}, "correct": "D", "explanation": "Bollards are physical barriers for vehicle protection — a preventive physical control, NOT corrective. DRP, backups, and patches are all corrective controls that restore or fix after an incident."}, {"num": 182, "text": "Which of these is included in an SLA document?", "options": {"A": "Instructions on data ownership and destruction", "B": "Instructions to detect, respond to, and limit the consequences of a cyber-attack", "C": "A plan to keep business operations going while recovering from a significant disruption", "D": "A plan to prepare the organization for the continuation of critical business functions"}, "correct": "A", "explanation": "SLA documents include instructions on data ownership and destruction, defining data management responsibilities. The other options describe BCP, incident response plans, and DRP documents."}, {"num": 183, "text": "Which port number corresponds to the Simple Mail Transfer Protocol (SMTP)?", "options": {"A": "161", "B": "69", "C": "25", "D": "22"}, "correct": "C", "explanation": "SMTP (Simple Mail Transfer Protocol) uses port 25. Port 161 is SNMP; port 69 is TFTP; port 22 is SSH."}, {"num": 184, "text": "Which type of attack attempts to mislead the user into exposing personal information by sending fraudulent emails?", "options": {"A": "Cross-Site Scripting", "B": "Denial of Service", "C": "Trojans", "D": "Phishing"}, "correct": "D", "explanation": "Phishing misleads users into exposing personal information through fraudulent emails. XSS injects scripts; DoS disrupts availability; Trojans deliver disguised malware."}, {"num": 185, "text": "Which of these is NOT a characteristic of the cloud?", "options": {"A": "Zero Customer Responsibility", "B": "Broad Network Access", "C": "Measured Service", "D": "Rapid Elasticity"}, "correct": "A", "explanation": "Zero Customer Responsibility is NOT a cloud characteristic. The five NIST cloud characteristics are: On-demand self-service, Broad network access, Resource pooling, Rapid elasticity, and Measured service."}, {"num": 186, "text": "Which of these is a COMMON mistake made when implementing record retention policies?", "options": {"A": "Not categorizing the type of information to be retained", "B": "Not labeling the type of information to be retained", "C": "Applying the longest retention periods to the information", "D": "Applying shorter retention periods to the information"}, "correct": "C", "explanation": "Applying the longest retention periods to all information is a common mistake — different data types have different legal and business retention requirements. Uniform maximum retention wastes resources and increases risk."}, {"num": 187, "text": "Which type of security control does NOT include CCTV cameras?", "options": {"A": "Corrective", "B": "Deterrent", "C": "Preventive", "D": "Detective"}, "correct": "A", "explanation": "CCTV cameras are NOT corrective controls — they cannot fix security issues. They serve as Detective (monitoring/recording), Deterrent (discouraging), and Preventive (discouraging access) controls."}, {"num": 188, "text": "A security consultant hired to design the security policies for the PHI within an organization will be primarily handling:", "options": {"A": "Personal Health information", "B": "Public Health information", "C": "Procedural Health information", "D": "Protected Health information"}, "correct": "D", "explanation": "PHI stands for Protected Health Information — medical records and health data requiring protection under HIPAA. The security consultant will be primarily handling sensitive patient health data."}, {"num": 189, "text": "Which of these cloud deployment models is a combination of public and private cloud storage?", "options": {"A": "Community", "B": "Private", "C": "Hybrid", "D": "Public"}, "correct": "C", "explanation": "Hybrid cloud combines public and private cloud infrastructure. Community cloud is shared among specific organizations; Private cloud is dedicated to one organization; Public cloud is open to all."}, {"num": 190, "text": "What is the primary goal of a Change Management Policy?", "options": {"A": "To standardize the creation of the organization's network and computer systems", "B": "To guarantee that systems are up to date with the latest security patch", "C": "To standardize the usage of the organization's network and computer systems", "D": "To guarantee that system changes are performed without negatively affecting business operations"}, "correct": "D", "explanation": "A Change Management Policy's primary goal is to guarantee system changes are performed without negatively impacting business operations — controlling the change process to prevent disruptions."}, {"num": 191, "text": "Which of these is NOT a feature of a SIEM (Security Information and Event Management)?", "options": {"A": "Log auditing", "B": "Log encryption", "C": "Log consolidation", "D": "Log retention"}, "correct": "B", "explanation": "Log encryption is NOT a standard SIEM feature. SIEM features include log consolidation (collection), log retention (storage), and log auditing (review and analysis)."}, {"num": 192, "text": "Which of these technologies is the LEAST effective means of preventing shared accounts?", "options": {"A": "Requiring a one-time password via an application", "B": "Requiring one-time passwords via a token", "C": "Password complexity requirements", "D": "Requiring biometric authentication"}, "correct": "C", "explanation": "Password complexity requirements are the LEAST effective at preventing shared accounts — multiple people can know the same complex password. Biometrics, OTP tokens, and OTP apps are unique to individuals."}, {"num": 193, "text": "Which of these is NOT a best practice in access management?", "options": {"A": "Trust but verify", "B": "Periodically assessing whether user permissions still apply", "C": "Giving only the right amount of permission", "D": "Requesting a justification when upgrading permission"}, "correct": "A", "explanation": "'Trust but verify' is NOT a best practice — Zero Trust ('never trust, always verify') replaces it. Periodic permission reviews, minimal permissions, and justification for upgrades ARE best practices."}, {"num": 194, "text": "(★) When analyzing risks, which of these activities is required?", "options": {"A": "Accepting all evaluated risks", "B": "Identifying risks associated with loss of confidentiality", "C": "Determining the likelihood of occurrence of a set of risks", "D": "Selecting the appropriate controls"}, "correct": "C", "explanation": "Determining the likelihood of occurrence is required in risk analysis — it is fundamental to calculating risk (likelihood × impact). Not all risks must be accepted; control selection comes after analysis."}, {"num": 195, "text": "Which of these exercises goes through a sample of an incident step-by-step, validating what each person will do?", "options": {"A": "A simulation exercise", "B": "A walk-through exercise", "C": "A tabletop exercise", "D": "A checklist exercise"}, "correct": "C", "explanation": "A tabletop exercise walks through a sample incident step-by-step in a discussion format, validating what each person will do. Simulation involves actual practice; walk-through reviews the plan; checklist exercises verify completeness."}, {"num": 196, "text": "(★) Which of these types of documents is usually THE LEAST formal?", "options": {"A": "Standards", "B": "Guidelines", "C": "Policies", "D": "Regulations"}, "correct": "B", "explanation": "Guidelines are typically the least formal documents — they are recommendations, not requirements. Regulations are most formal (legal); policies are organizational mandates; standards define specific requirements."}, {"num": 197, "text": "A backup that captures the changes made since the latest full backup is an example of:", "options": {"A": "A differential backup", "B": "An incremental backup", "C": "A backup snapshot", "D": "A full backup"}, "correct": "A", "explanation": "A differential backup captures all changes since the latest full backup. An incremental backup captures only changes since the last backup of any type. Differential backups grow larger but restore faster (only need full + latest differential)."}, {"num": 198, "text": "A high-level executive of an organization receives a malicious email that tries to trick him. Which attack is the perpetrator using?", "options": {"A": "DDOS", "B": "Whaling", "C": "Phishing", "D": "Spear phishing"}, "correct": "B", "explanation": "Whaling targets high-level executives (C-suite) with malicious emails. Regular phishing is broad; spear phishing targets specific individuals; DDoS is a network attack, not a targeted email attack."}, {"num": 199, "text": "What does redundancy mean in the context of cybersecurity?", "options": {"A": "Designing systems with robust components, so that the organization has more attack resilience", "B": "Conceiving systems with only the most necessary components, so that the organization has just the necessary risks.", "C": "Conceiving systems with less attack surface, so that the attacker has less chance of success", "D": "Conceiving systems with duplicate components so that, if a failure occurs, there will be a backup"}, "correct": "D", "explanation": "Redundancy means designing systems with duplicate components so that if one fails, a backup takes over, ensuring continuity of operations. It is about failover and backup, not minimizing components."}, {"num": 200, "text": "When a company collects PII, which policy is required?", "options": {"A": "Remote Access Policy", "B": "GDPR", "C": "Privacy Policy", "D": "Acceptable Use Policy"}, "correct": "C", "explanation": "If a company collects PII, a Privacy Policy is required to disclose data practices to individuals. GDPR is a regulation, not an internal policy; AUP governs system use; Remote Access Policy governs connections."}, {"num": 201, "text": "Which type of attack PRIMARILY aims to consume all the available resources, thereby making an organization's service inaccessible to its intended users?", "options": {"A": "Trojans", "B": "Cross-Site Scripting", "C": "Denial of Service", "D": "Phishing"}, "correct": "C", "explanation": "Denial of Service (DoS) primarily aims to consume all available resources to make services inaccessible to legitimate users. Trojans, XSS, and Phishing have different primary objectives."}, {"num": 202, "text": "Which one of these tools is MOST likely to detect an XSS vulnerability?", "options": {"A": "Network vulnerability scanner", "B": "Static application test", "C": "Intrusion detection system", "D": "Web application vulnerability scanner"}, "correct": "D", "explanation": "A web application vulnerability scanner is most likely to detect XSS — it specifically tests web app input fields and outputs for injection flaws. Network scanners test infrastructure; SAST tests source code; IDS detects active attacks."}, {"num": 203, "text": "Which kind of physical access control is LESS effective at preventing unauthorized individual access to a data center?", "options": {"A": "Turnstiles", "B": "Barriers", "C": "Fences", "D": "Bollards"}, "correct": "D", "explanation": "Bollards are vehicle barriers — LEAST effective at preventing unauthorized individual access. Turnstiles, barriers, and fences all physically restrict pedestrian movement more effectively."}, {"num": 204, "text": "Which of these is NOT a type of malware?", "options": {"A": "Trojan", "B": "Worm", "C": "Spoofing", "D": "Rootkit"}, "correct": "C", "explanation": "Spoofing is NOT malware — it is an attack technique (falsifying identity). Trojans, Worms, and Rootkits are all types of malware."}, {"num": 205, "text": "Which security principle states that a user should only have the necessary permission to execute a task?", "options": {"A": "Privileged Accounts", "B": "Separation of Duties", "C": "Least Privilege", "D": "Defense in Depth"}, "correct": "C", "explanation": "Least Privilege means a user should have only the minimum permissions needed to perform their task. Separation of Duties divides critical tasks; Defense in Depth uses layers; Privileged Accounts are elevated-permission accounts."}];

// ── STATE ──
let questions = [...QUESTIONS];
let currentIdx = 0;
let answers = {};
let mode = 'quiz';

// ── DARK MODE ──
function toggleDark() {
  const isDark = document.body.classList.toggle('dark');
  document.getElementById('dark-btn').textContent = isDark ? '☀️ Light' : '🌙 Dark';
  localStorage.setItem('bl-dark', isDark ? '1' : '0');
}
if (localStorage.getItem('bl-dark') === '1') {
  document.body.classList.add('dark');
  document.getElementById('dark-btn').textContent = '☀️ Light';
}

// ── HELPERS ──
function answered(q) { return answers[q.num] !== undefined; }
function isCorrect(q) { return answers[q.num]?.isCorrect; }
function isStarred(q) { return q.text.includes('★'); }

function updateHeaderStats() {
  const correct = Object.values(answers).filter(a => a.isCorrect).length;
  const wrong = Object.values(answers).filter(a => !a.isCorrect).length;
  document.getElementById('hdr-correct').textContent = correct;
  document.getElementById('hdr-wrong').textContent = wrong;
}

function updateProgress() {
  const total = questions.length;
  const done = questions.filter(q => answered(q)).length;
  const pct = Math.round((done / total) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = `Question ${currentIdx + 1} of ${total}`;
  document.getElementById('prog-pct').textContent = `${pct}% answered`;
}

function showToast(msg, dur = 2200) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

// ── RENDER ──
function render() {
  if (mode === 'summary') { renderSummary(); return; }
  if (mode === 'review') { renderReview(); return; }
  renderQuiz();
}

function renderQuiz() {
  const q = questions[currentIdx];
  const ans = answers[q.num];
  const isAnswered = ans !== undefined;

  updateProgress();

  const optionsHtml = Object.entries(q.options).map(([letter, text]) => {
    let cls = '';
    let disabled = isAnswered ? 'disabled' : '';
    if (isAnswered) {
      if (letter === q.correct) cls = 'correct';
      else if (letter === ans.selected && letter !== q.correct) cls = 'wrong';
    }
    return `<button class="option ${cls}" ${disabled} onclick="selectAnswer('${letter}', ${q.num})">
      <div class="option-letter">${letter}</div>
      <div class="option-text">${text}</div>
    </button>`;
  }).join('');

  let expHtml = '';
  if (isAnswered) {
    const headCls = ans.isCorrect ? 'correct-head' : 'wrong-head';
    const icon = ans.isCorrect ? '✓ Correct!' : '✗ Incorrect';
    const correctNote = !ans.isCorrect
      ? `<div class="exp-correct-note">✓ Correct answer: ${q.correct}. ${q.options[q.correct]}</div>`
      : '';
    expHtml = `<div class="explanation-box">
      <div class="exp-header ${headCls}">${icon}</div>
      <div class="exp-body">${q.explanation}${correctNote}</div>
    </div>`;
  }

  const prevDisabled = currentIdx === 0 ? 'disabled' : '';
  const nextDisabled = currentIdx === questions.length - 1 ? 'disabled' : '';

  document.getElementById('main-content').innerHTML = `
    <div class="score-panel">
      <div class="score-card score-correct">
        <div class="score-num">${Object.values(answers).filter(a=>a.isCorrect).length}</div>
        <div class="score-label">Correct</div>
      </div>
      <div class="score-card score-wrong">
        <div class="score-num">${Object.values(answers).filter(a=>!a.isCorrect).length}</div>
        <div class="score-label">Incorrect</div>
      </div>
      <div class="score-card score-remaining">
        <div class="score-num">${questions.filter(q=>!answered(q)).length}</div>
        <div class="score-label">Remaining</div>
      </div>
    </div>

    <div class="jump-bar">
      <span class="controls-label">Jump to #</span>
      <input class="jump-input" type="number" min="1" max="${questions.length}" id="jump-input" placeholder="1–${questions.length}">
      <button class="btn btn-outline" onclick="jumpTo()">Go</button>
    </div>

    <div class="question-card">
      <div class="q-header">
        <span class="q-num">QUESTION ${currentIdx + 1} / ${questions.length} &nbsp;·&nbsp; #${q.num}</span>
        <div class="q-tags">
          ${isStarred(q) ? '<span class="tag tag-starred">★ Priority</span>' : ''}
        </div>
      </div>
      <div class="q-body">
        <div class="q-text">${q.text.replace('(★)','').replace('★','').trim()}</div>
        <div class="options">${optionsHtml}</div>
        ${expHtml}
      </div>
      <div class="q-footer">
        <div class="nav-group">
          <button class="btn btn-outline" onclick="navigate(-1)" ${prevDisabled}>← Prev</button>
          <button class="btn btn-outline" onclick="navigate(1)" ${nextDisabled}>Next →</button>
        </div>
        ${isAnswered && currentIdx < questions.length - 1
          ? `<button class="btn btn-primary" onclick="navigate(1)">Continue →</button>`
          : ''}
      </div>
    </div>
  `;
}

function selectAnswer(letter, qNum) {
  const q = questions.find(q => q.num === qNum);
  if (!q || answers[q.num]) return;

  const isCorrectAns = letter === q.correct;
  answers[q.num] = {
    selected: letter,
    isCorrect: isCorrectAns
  };

  updateHeaderStats();
  render();
}

function navigate(dir) {
  currentIdx = Math.max(0, Math.min(questions.length - 1, currentIdx + dir));
  render();
}

function jumpTo() {
  const val = parseInt(document.getElementById('jump-input')?.value);
  if (val >= 1 && val <= questions.length) {
    currentIdx = val - 1;
    render();
  }
}

function renderSummary() {
  const correct = Object.values(answers).filter(a => a.isCorrect).length;
  const wrong = Object.values(answers).filter(a => !a.isCorrect).length;
  const total = questions.length;
  const done = correct + wrong;
  const pct = done > 0 ? Math.round((correct / done) * 100) : 0;

  const cells = questions.map((q, i) => {
    let cls = 'cell-unanswered';
    if (answered(q)) cls = isCorrect(q) ? 'cell-correct' : 'cell-wrong';
    return `<div class="grid-cell ${cls}" onclick="goToQ(${i})" title="Q${q.num}">${q.num}</div>`;
  }).join('');

  document.getElementById('main-content').innerHTML = `
    <div class="score-panel" style="margin-bottom:24px;">
      <div class="score-card score-correct">
        <div class="score-num">${correct}</div>
        <div class="score-label">Correct</div>
      </div>
      <div class="score-card score-wrong">
        <div class="score-num">${wrong}</div>
        <div class="score-label">Incorrect</div>
      </div>
      <div class="score-card score-remaining">
        <div class="score-num">${total - done}</div>
        <div class="score-label">Unanswered</div>
      </div>
    </div>
    <div class="question-card" style="padding:24px;">
      <div style="text-align:center;margin-bottom:24px;">
        <div style="font-family:'DM Serif Display',serif;font-size:48px;color:var(--accent);">${pct}%</div>
        <div style="color:var(--gray-400);font-size:13px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;">${done} of ${total} attempted</div>
      </div>
      <p class="section-h">Question Map</p>
      <div class="summary-grid">${cells}</div>
    </div>
  `;
  updateProgress();
}

function renderReview() {
  const cards = questions.map((q, i) => {
    const ans = answers[q.num];
    const optHtml = Object.entries(q.options).map(([letter, text]) => {
      let cls = '';
      if (ans) {
        if (letter === q.correct) cls = 'correct';
        else if (letter === ans.selected && letter !== q.correct) cls = 'wrong';
      }
      return `<button class="option ${cls}" disabled>
        <div class="option-letter">${letter}</div>
        <div class="option-text">${text}</div>
      </button>`;
    }).join('');

    let expHtml = '';
    if (ans) {
      const headCls = ans.isCorrect ? 'correct-head' : 'wrong-head';
      const correctNote = !ans.isCorrect
        ? `<div class="exp-correct-note">✓ Correct answer: ${q.correct}. ${q.options[q.correct]}</div>`
        : '';
      expHtml = `<div class="explanation-box">
        <div class="exp-header ${headCls}">${ans.isCorrect ? '✓ Correct!' : '✗ Incorrect'}</div>
        <div class="exp-body">${q.explanation}${correctNote}</div>
      </div>`;
    }

    return `<div class="question-card" style="margin-bottom:20px;">
      <div class="q-header">
        <span class="q-num">Q${q.num}</span>
        ${isStarred(q) ? '<span class="tag tag-starred">★ Priority</span>' : ''}
      </div>
      <div class="q-body">
        <div class="q-text" style="font-size:15px;">${q.text.replace('(★)','').replace('★','').trim()}</div>
        <div class="options">${optHtml}</div>
        ${expHtml}
      </div>
    </div>`;
  }).join('');

  document.getElementById('main-content').innerHTML = cards;
  updateProgress();
}

function goToQ(idx) { currentIdx = idx; setMode('quiz'); }

function setMode(m) {
  mode = m;
  ['quiz','review','summary'].forEach(x => {
    document.getElementById('mode-'+x).classList.toggle('active', x === m);
  });
  render();
}

function shuffleQuestions() {
  for (let i = questions.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [questions[i], questions[j]] = [questions[j], questions[i]];
  }
  currentIdx = 0;
  showToast('Questions shuffled!');
  render();
}

function resetAll() {
  if (!confirm('Reset all progress?')) return;
  answers = {};
  currentIdx = 0;
  questions = [...QUESTIONS];
  updateHeaderStats();
  showToast('Progress reset.');
  render();
}

// ── KEYBOARD NAV ──
document.addEventListener('keydown', e => {
  if (mode !== 'quiz') return;
  if (['A','B','C','D'].includes(e.key.toUpperCase()) && !answers[questions[currentIdx].num]) {
    selectAnswer(e.key.toUpperCase(), questions[currentIdx].num);
  }
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === 'ArrowLeft') navigate(-1);
});

// ── INIT ──
render();
</script>
</body>
</html>
